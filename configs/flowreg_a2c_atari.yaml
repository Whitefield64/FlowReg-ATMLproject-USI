run_name: flowreg_a2c_atari
env_id: ALE/Breakout-v5
seed: 0
total_timesteps: 10000000
n_envs: 16
policy: CnnPolicy
device: cuda
wandb_mode: online
atari_env_kwargs:
  frameskip: 1
  repeat_action_probability: 0.0
atari_wrapper_kwargs:
  frame_skip: 4
  action_repeat_probability: 0.0
learning_rate_schedule: linear
a2c:
  learning_rate: 0.0007
  n_steps: 5
  gamma: 0.99
  gae_lambda: 1.0
  ent_coef: 0.01
  vf_coef: 0.25
  max_grad_norm: 0.5
flowreg:
  enabled: true
  lambda_flow: 1.0
  representation: features
  loss_reduction: paper
  sequence_length: 5
  batch_size: 32
  update_freq: 5
  update_unit: train_call
  learning_rate: 0.0007
  hidden_dim: 512
  rtol: 0.0001
  atol: 0.00001
  time_sampling: index
eval:
  n_eval_episodes: 10
  deterministic: false
