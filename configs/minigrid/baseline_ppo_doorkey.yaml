run_name: baseline_ppo_doorkey
env_id: MiniGrid-DoorKey-16x16-v0
seed: 0
total_timesteps: 1000000
n_envs: 4
policy: MlpPolicy
wrapper: img_flatten
device: cpu
wandb_mode: online
feature_extractor:
  name: minigrid_mlp
  features_dim: 64
  hidden_dim: 128
ppo:
  learning_rate: 0.0003
  n_steps: 256
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
eval:
  n_eval_episodes: 10
  deterministic: true

